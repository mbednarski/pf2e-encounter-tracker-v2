name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    name: Check, test, audit, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test
        run: npm run test:run

      - name: Audit dependencies
        run: npm run audit

      - name: Build static site
        run: npm run build
