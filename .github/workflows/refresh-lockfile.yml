name: Refresh package-lock.json on Linux

# Why this exists:
#   `npm install` records platform-specific optional deps. When the lockfile
#   is regenerated on Windows, Linux-only packages (e.g. rolldown's WASM
#   fallback chain pulling @emnapi/runtime) are absent, so `npm ci` on
#   ubuntu-latest fails with "Missing: ... from lock file".
#
#   This workflow regenerates package-lock.json on ubuntu-latest and commits
#   it back to the branch when the lockfile is out of sync. It is the
#   canonical fix when Windows dependency installs cause CI drift.
#
# When it runs:
#   - Automatically on every push to a non-master branch (preflight check
#     that exits fast if the lockfile is already in sync).
#   - Manually via workflow_dispatch once this workflow exists on master.
#
# Loop safety: pushes by github-actions[bot] (the commit this workflow itself
# creates) do not retrigger workflows by GitHub's design, so the regen push
# does not loop.
#
# After regen pushes a new commit, downstream CI will not auto-rerun on the
# PR (same GitHub-token-push restriction). Re-run failing CI checks manually.

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - master

permissions:
  contents: write

concurrency:
  group: refresh-lockfile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Regenerate lockfile and commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Preflight — does npm ci accept the current lockfile?
        id: preflight
        continue-on-error: true
        run: npm ci --dry-run --silent

      - name: Regenerate lockfile (lockfile-only, no install)
        if: steps.preflight.outcome == 'failure'
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Check whether lockfile changed
        if: steps.preflight.outcome == 'failure'
        id: diff
        run: |
          if git diff --quiet package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "package-lock.json regen produced no diff — manual investigation may be needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "package-lock.json was updated. Diff stat:"
            git diff --stat package-lock.json
          fi

      - name: Commit and push refreshed lockfile
        if: steps.preflight.outcome == 'failure' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Refresh package-lock.json on Linux

          Regenerated by .github/workflows/refresh-lockfile.yml because the
          previous lockfile was generated on a non-Linux host and was missing
          platform-specific optional dependencies."
          git push origin HEAD:${{ github.ref_name }}
