<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PF2e Encounter Tracker — Design Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; }
  body { font-family: Inter, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.5); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="direction-a.jsx"></script>
<script type="text/babel" src="direction-b-shared.jsx"></script>
<script type="text/babel" src="direction-b-card.jsx"></script>
<script type="text/babel" src="direction-b.jsx"></script>
<script type="text/babel" src="condition-states.jsx"></script>
<script type="text/babel" src="radial-menu.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas title="PF2e Encounter Tracker" subtitle="Two readability-focused directions">
      <DCSection id="directions" title="Encounter Tracker — Hi-Fi">
        <DCArtboard id="parchment" label="A · Reference Sheet (light, parchment)" width={1440} height={1000}>
          <DirectionA />
        </DCArtboard>
        <DCArtboard id="console" label="B · Console (dark, dashboard)" width={1440} height={1000}>
          <DirectionB />
        </DCArtboard>
      </DCSection>
      <DCSection id="conditions" title="Condition picker / editor — UX states">
        <DCArtboard id="condition-states" label="Add · Edit · Right-click menu" width={1440} height={720}>
          <ConditionStatesMockup />
        </DCArtboard>
        <DCArtboard id="radial-states" label="Radial menu — Trigger · Hub · Sub-arc · Value scrub" width={1880} height={720}>
          <RadialStatesMockup />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
